<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .modal-active { overflow: hidden; }
        .anime-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <header class="py-12 px-6 text-center border-b border-gray-800 bg-gradient-to-r from-red-900 to-black">
        <h1 class="text-5xl font-black italic tracking-tighter mb-2">MY TOP 10 ANIME</h1>
    </header>

    <main class="max-w-6xl mx-auto p-8">
        <div id="animeList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6"></div>
    </main>

    <div id="detailModal" class="fixed inset-0 bg-black z-50 hidden overflow-y-auto">
        <button onclick="closeModal()" class="fixed top-6 right-6 text-3xl hover:text-red-500 z-[60]"><i class="fas fa-times"></i></button>
        <div id="modalContent" class="min-h-screen flex flex-col md:flex-row items-center p-8 md:p-20 gap-10"></div>
    </div>

    <script>
        const animeData = [
            { id: 1, title: "Bungo Stray Dogs", rating: 8.5, img: "https://m.media-amazon.com/images/S/pv-target-images/795016aba9b1a781a43c918f6891134d1ded23598af79a6255ec882b1bc5ef1b.jpg", desc: "เหล่าผู้มีพลังพิเศษไขคดีเหนือธรรมชาติในเมืองโยโกฮาม่า", genre: "Action, Supernatural" },
            { id: 2, title: "Sakamoto Days", rating: 8.9, img: "https://jumpg-assets.tokyo-cdn.com/secure/title/300003/title_thumbnail_portrait_list/313636.jpg?hash=b500Sycchj7cis8Mms6aFw&expires=2145884400", desc: "อดีตนักฆ่าในตำนานที่ผันตัวไปเปิดร้านขายของชำ", genre: "Action, Comedy" },
            { id: 3, title: "Black Clover", rating: 8.1, img: "https://image.dek-d.com/27/0865/7546/t_132425508 "อัสต้า เด็กหนุ่มไร้เวทย์มุ่งสู่การเป็นจักรพรรดิเวทมนตร์", genre: "Action, Fantasy" },
            { id: 4, title: "One Piece", rating: 8.7, img: "https://i.pinimg.com/474x/a0/ec/b5/a0ecb595ed56628b41f33a691b4d6cbe.jpg", desc: "การผจญภัยตามหาสมบัติในตำนานของกลุ่มโจรสลัดหมวกฟาง", genre: "Adventure, Fantasy" },
            { id: 5, title: "Death Note", rating: 8.6, img: "https://t1.blockdit.com/photos/2022/09/633485854515825094e08796_800x0xcover_rqK7NUzy.jpg", desc: "สมุดสั่งตายและการดวลสมองของอัจฉริยะสองคน", genre: "Thriller, Psychological" },
            { id: 6, title: "Demon Slayer", rating: 8.4, img: "https://images.lifestyleasia.com/wp-content/uploads/sites/8/2024/06/17180645/demon_slayer_all_arc_01-373x560.jpg", desc: "การต่อสู้เพื่อช่วยน้องสาวและล่าอสูรด้วยปราณต่างๆ", genre: "Action, Fantasy" },
            { id: 7, title: "Naruto", rating: 8.3, img: "", desc: "เด็กหนุ่มผู้มีจิ้งจอกเก้าหางพยายามทำให้คนยอมรับ", genre: "Action, Ninja" },
            { id: 8, title: "Hunter x Hunter", rating: 9.0, img: "https://img.online-station.net/image_content/2023/07/hunterxgunter_visual-421x600.jpg", desc: "การผจญภัยเพื่อตามหาพ่อในโลกฮันเตอร์สุดอันตราย", genre: "Adventure" },
            { id: 9, title: "Spy x Family", rating: 8.5, img: "", desc: "ครอบครัวปลอมๆ ของสายลับ นักฆ่า และเด็กพลังจิต", genre: "Comedy" },
            { id: 10, title: "Attack on Titan", rating: 9.1, img: "https://cdn.gotoknow.org/assets/media/files/001/450/216/large_20220323162037.jpg?1648027234", desc: "สงครามสุดท้ายของมนุษย์กับยักษ์กินคนหลังกำแพง", genre: "Action, Drama" }
        ];

        const animeList = document.getElementById('animeList');
        const modal = document.getElementById('detailModal');
        const modalContent = document.getElementById('modalContent');

        animeData.forEach(anime => {
            animeList.innerHTML += `
                <div onclick="openModal(${anime.id})" class="anime-card cursor-pointer group bg-gray-900 rounded-lg overflow-hidden">
                    <img src="${anime.img}" class="w-full h-72 object-cover transition duration-500">
                    <div class="p-4">
                        <span class="text-red-500 font-bold">#${anime.id}</span>
                        <h3 class="font-bold text-sm truncate">${anime.title}</h3>
                    </div>
                </div>`;
        });

        function openModal(id) {
            const anime = animeData.find(a => a.id === id);
            modalContent.innerHTML = `
                <div class="md:w-1/3"><img src="${anime.img}" class="rounded-3xl w-full shadow-2xl"></div>
                <div class="md:w-2/3 space-y-6 text-left">
                    <h2 class="text-5xl font-black">${anime.title}</h2>
                    <p class="text-yellow-400 text-xl font-bold"><i class="fas fa-star"></i> ${anime.rating}</p>
                    <p class="text-2xl text-gray-300">${anime.desc}</p>
                    <button onclick="closeModal()" class="bg-white text-black px-8 py-3 rounded-full font-bold">BACK</button>
                </div>`;
            modal.classList.remove('hidden');
            document.body.classList.add('modal-active');
        }

        function closeModal() {
            modal.classList.add('hidden');
            document.body.classList.remove('modal-active');
        }
    </script>
</body>
</html>
