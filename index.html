<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Must-Watch Anime</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .modal-active { overflow: hidden; }
        .anime-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body class="bg-black text-white font-sans">

    <!-- Header -->
    <header class="py-12 px-6 text-center border-b border-gray-800 bg-gradient-to-r from-red-900 to-black">
        <h1 class="text-5xl font-black italic tracking-tighter mb-2">TOP 10 ANIME</h1>
        <p class="text-gray-400">10 สุดยอดอนิเมะที่ชีวิตนี้ "ต้องดู" ให้ได้สักครั้ง</p>
    </header>

    <!-- Anime List Section -->
    <main class="max-w-6xl mx-auto p-8">
        <div id="animeList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-6">
            <!-- Cards will be injected here -->
        </div>
    </main>

    <!-- Full-screen Detail Modal -->
    <div id="detailModal" class="fixed inset-0 bg-black z-50 hidden overflow-y-auto">
        <button onclick="closeModal()" class="fixed top-6 right-6 text-3xl hover:text-red-500 z-[60]">
            <i class="fas fa-times"></i>
        </button>
        <div id="modalContent" class="min-h-screen flex flex-col md:flex-row items-center p-8 md:p-20 gap-10">
            <!-- Details will be injected here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
